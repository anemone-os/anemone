[build]
arch = "riscv64"
exec_env = "sbi"

[constants]
phys_ram_start = 0x40000000
max_phys_ram_size = 0x200000000     # 8GB
kernel_la_base = 0x80200000
kernel_va_base = 0xffffffff80200000
max_phys_cpu_id = 4
frame_section_shift_mb = 7

[dtb]
source = "conf/platforms/visionfive2-board.dts"
delivery = "firmware"
authority = "provider-derived"
provider = "firmware"

[dtb.firmware-baseline]
# Exported from the runtime FDT of the supported board through U-Boot.
provenance = "uboot-hardware-export"
# Any other runtime difference requires Platform DT review before acceptance.
allowed-runtime-differences = ["chosen-rng-seed"]
runtime-validation-owner = "platform-maintainer"


[uboot]
arch = "riscv"
os_type = "linux"
image_type = "kernel"
compression = "none"
load_addr = 0x80200000
entry = 0x80200000
name = "Anemone OS for RISC-V"
filename = "anemoneImage-rv64"
