[build]
name = "tty-acceptance-rv64"
arch = "riscv64"

[fs]
type = "folder"
fstype = "ext4"

[init]
path = "/sbin/tty-test"

[[dirs]]
path = "/dev"

[[dirs]]
path = "/bin"

[[dirs]]
path = "/tmp"

[[dirs]]
path = "/etc"

[[apps]]
name = "tty-test"
installed_dir = "/sbin"

[[files]]
source = "build/tty-acceptance/staging/riscv64/busybox"
installed_path = "/bin/busybox"

[[files]]
source = "build/tty-acceptance/staging/riscv64/mode"
installed_path = "/etc/tty-test-mode"
