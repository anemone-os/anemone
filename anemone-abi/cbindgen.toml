language = "C"
pragma_once = true
autogen_warning = "/* Auto-generated by cbindgen. Do not edit. */"
line_length = 80
style = "tag"
documentation = true

[fn]
rename_args = "SnakeCase"

[struct]
rename_fields = "SnakeCase"

[enum]
rename_variants = "None"

[defines]
"target_arch = riscv64" = "__ANEMONE_ARCH_RISCV64__"
